<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil | Mini Transformer</title>
    <style>
        /* Reutilizamos las variables del sistema para total coherencia */
        :root {
            --bg: #030308;
            --card-bg: rgba(18, 18, 42, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f0f0f5;
            --accent: #00e5ff;
            --btn-grad: linear-gradient(135deg, #00e5ff 0%, #7b2ff7 100%);
        }

        /* Aplicación de las clases de tema del index */
        body.light { --bg: #f0f4ff; --card-bg: rgba(255, 255, 255, 0.8); --text-main: #1a1a2e; }
        body.pink { --bg: #fff0f5; --card-bg: rgba(255, 228, 230, 0.7); --text-main: #881337; }
        body.green { --bg: #f0fdf4; --card-bg: rgba(220, 252, 231, 0.7); --text-main: #166534; }
        body.bubble { --bg: #e0f7fa; --card-bg: rgba(178, 235, 242, 0.7); --text-main: #006064; }

        body { 
            background: var(--bg); color: var(--text-main); font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;
        }

        .profile-card {
            background: var(--card-bg); backdrop-filter: blur(15px);
            border: 1px solid var(--card-border); padding: 40px;
            border-radius: 28px; width: 100%; max-width: 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); text-align: center;
        }

        .avatar {
            width: 120px; height: 120px; border-radius: 50%;
            margin: 0 auto 20px; border: 4px solid var(--accent);
            object-fit: cover; background: #1a1a2e;
        }

        input {
            width: 100%; padding: 15px; margin: 10px 0; background: rgba(0,0,0,0.2);
            border: 1px solid var(--card-border); border-radius: 12px; color: var(--text-main);
        }

        button {
            width: 100%; padding: 15px; background: var(--btn-grad);
            border: none; border-radius: 12px; color: white; font-weight: bold;
            cursor: pointer; margin-top: 10px;
        }

        a { color: var(--accent); text-decoration: none; font-size: 0.9rem; margin-top: 15px; display: block; }
    </style>
</head>
<body>

<div class="profile-card">
    <h2>Mi Perfil</h2>
    <img src="https://via.placeholder.com/120" id="avatar" class="avatar" alt="Avatar">
    
    <input type="text" id="display_name" placeholder="Nombre de usuario">
    <input type="tel" id="phone_number" placeholder="Teléfono">
    <input type="file" id="photo_input" accept="image/*" style="display:none">
    <button onclick="document.getElementById('photo_input').click()">Cambiar Foto</button>
    <button onclick="saveProfile()" style="margin-top: 10px;">Guardar Cambios</button>
    
    <a href="/">← Volver al Dashboard</a>
</div>

<script>
    // Recuperar tema al cargar
    document.body.className = localStorage.getItem("nn-theme") || "";

    async function saveProfile() {
        const name = document.getElementById('display_name').value;
        const phone = document.getElementById('phone_number').value;
        // Lógica de guardado...
        alert("Cambios guardados con éxito.");
    }
</script>
</body>
</html>
